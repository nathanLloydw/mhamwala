title: 'Call to Action'
fields:
  -
    handle: small_header
    field:
      input_type: text
      antlers: false
      display: 'Small Header'
      type: text
      icon: text
      listable: hidden
      instructions_position: above
      read_only: false
  -
    handle: description
    field:
      always_show_set_button: false
      buttons:
        - h1
        - h2
        - bold
        - italic
        - unorderedlist
        - orderedlist
        - removeformat
        - quote
        - anchor
        - image
        - table
      save_html: false
      toolbar_mode: fixed
      link_noopener: false
      link_noreferrer: false
      target_blank: false
      reading_time: false
      fullscreen: true
      allow_source: true
      enable_input_rules: true
      enable_paste_rules: true
      antlers: false
      display: Description
      type: bard
      icon: bard
      listable: hidden
      instructions_position: above
      read_only: false
